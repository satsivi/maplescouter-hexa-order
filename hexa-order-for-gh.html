<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hexa Order</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --border: #1e1e2e;
  --accent: #7c3aff;
  --accent2: #00e5ff;
  --text: #e8e8f0;
  --muted: #555570;
  --gold: #f4c430;
  --red: #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 16px 80px;
}
body::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 400px;
  background: radial-gradient(ellipse, rgba(124,58,255,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.wrap { width: 100%; max-width: 960px; }
header { text-align: center; margin-bottom: 36px; }
h1 {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(28px,6vw,48px);
  letter-spacing: 2px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sub { color: var(--muted); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-top: 6px; }

/* ── Panel ── */
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 14px; }
.plabel { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

/* ── Search dropdown ── */
.field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
.field label { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
.search-wrap { position: relative; }
input[type=text] {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px;
  padding: 11px 13px; width: 100%; outline: none; transition: border-color .2s;
}
input[type=text]:focus { border-color: var(--accent); }
input[type=text]::placeholder { color: var(--muted); }
#dd {
  display: none; position: absolute; top: 100%; left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--accent); border-top: none;
  border-radius: 0 0 8px 8px; max-height: 220px; overflow-y: auto; z-index: 100;
}
.ddi {
  padding: 9px 13px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border);
}
.ddi:hover { background: rgba(124,58,255,0.12); }
.ddi span { color: var(--muted); font-size: 11px; margin-left: 8px; }
.sel-label { font-size: 11px; color: var(--accent2); min-height: 15px; }

/* ── Cycles ── */
.cycle-row { display: flex; gap: 7px; margin-bottom: 0; }
.cbtn {
  flex: 1; padding: 10px 6px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; color: var(--muted); font-family: 'DM Mono', monospace;
  font-size: 13px; cursor: pointer; transition: all .15s; text-align: center;
}
.cbtn:hover { border-color: var(--accent); color: var(--text); }
.cbtn.on { background: rgba(124,58,255,0.15); border-color: var(--accent); color: var(--accent2); }
.go {
  width: 100%; margin-top: 12px; padding: 15px;
  background: linear-gradient(135deg, var(--accent), #5b21b6);
  border: none; border-radius: 9px; color: #fff;
  font-family: 'Black Han Sans', sans-serif; font-size: 15px; letter-spacing: 2px;
  cursor: pointer; transition: opacity .2s;
}
.go:hover { opacity: .88; }
.go:disabled { opacity: .38; cursor: not-allowed; }

/* ── Results header ── */
.res-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.res-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
.res-meta  { font-size: 11px; color: var(--accent2); }

/* ── ICON GRID ── */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.ic {
  position: relative;
  width: 62px;
  height: 62px;
  flex-shrink: 0;
  cursor: default;
}
.ic img {
  width: 62px;
  height: 62px;
  display: block;
  border-radius: 7px;
  border: 2px solid #252535;
  background: #08080e;
  object-fit: contain;
}
.ic img:hover { border-color: var(--accent2); }
.lv {
  position: absolute;
  bottom: 2px; right: 2px;
  min-width: 16px; height: 16px; padding: 0 3px;
  background: rgba(0,0,0,.88);
  border: 1px solid #444; border-radius: 3px;
  color: #fff; font-size: 10px; font-weight: 600;
  font-family: 'DM Mono', monospace;
  line-height: 16px; text-align: center;
  pointer-events: none;
}

/* ── Tooltip ── */
#tip {
  position: fixed; display: none;
  width: 215px;
  background: #13131f; border: 1px solid var(--accent);
  border-radius: 8px; padding: 10px 12px;
  z-index: 9999; box-shadow: 0 8px 28px rgba(0,0,0,.85);
  pointer-events: none;
}
.tn { font-family: 'Black Han Sans', sans-serif; font-size: 13px; color: var(--accent2); margin-bottom: 6px; line-height: 1.35; }
.tr { font-size: 11px; color: #777; line-height: 1.8; }
.tr b { color: #ddd; font-weight: 500; }
.te { color: #a78bfa; font-weight: 600; }

/* ── Error / loading ── */
.err { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.3); border-radius: 8px; padding: 13px 15px; color: var(--red); font-size: 13px; }
.loading { text-align: center; padding: 30px; color: var(--muted); font-size: 13px; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>HEXA ORDER</h1>
    <p class="sub">MapleStory 6th Job · Skill Priority Calculator</p>
  </header>

  <div class="panel">
    <div class="plabel">Configuration</div>

    <div class="field">
      <label>CLASS</label>
      <div class="search-wrap">
        <input type="text" id="csearch" placeholder="Search class… (or type 'test')" autocomplete="off">
        <div id="dd"></div>
      </div>
      <div class="sel-label" id="sellabel"></div>
    </div>

    <div class="field" style="margin-bottom:0">
      <label>DEAL CYCLES</label>
      <div class="cycle-row">
        <button class="cbtn" data-c="1" onclick="setCycle(this)">1</button>
        <button class="cbtn on"  data-c="2" onclick="setCycle(this)">2</button>
        <button class="cbtn" data-c="3" onclick="setCycle(this)">3</button>
        <button class="cbtn" data-c="4" onclick="setCycle(this)">4</button>
        <button class="cbtn" data-c="5" onclick="setCycle(this)">5</button>
      </div>
    </div>

    <button class="go" id="gobtn" onclick="go()">CALCULATE ORDER</button>
  </div>

  <div id="results"></div>
</div>

<div id="tip"></div>

// ── Tooltip ──────────────────────────────────────────────────────────────
(function(){
  var tip = document.getElementById('tip');
  document.addEventListener('mouseover', function(e){
    var c = e.target.closest && e.target.closest('.ic');
    if (!c || !c.dataset.t) { tip.style.display='none'; return; }
    tip.innerHTML = decodeURIComponent(c.dataset.t);
    tip.style.display = 'block';
    move(e);
  });
  document.addEventListener('mousemove', function(e){
    if (tip.style.display === 'none') return;
    if (!(e.target.closest && e.target.closest('.ic'))) { tip.style.display='none'; return; }
    move(e);
  });
  function move(e){
    var m=14, tw=215, th=tip.offsetHeight||120;
    var x = e.clientX+m, y = e.clientY-th-m;
    if (x+tw > window.innerWidth-8) x = e.clientX-tw-m;
    if (y < 8) y = e.clientY+m;
    tip.style.left = x+'px'; tip.style.top = y+'px';
  }
})();

// Mastery ID -> label
var MASTERY_LABEL = { 2:'M1', 7:'M2', 8:'M3', 9:'M4' };

function xlate(imgPath, koFallback) {
  if (imgPath && imgPath.indexOf('nexon.com') !== -1) return 'HEXA Stat';
  if (!imgPath) return koFallback || '—';
  var fname = imgPath.split('/').pop().replace('.png','').replace('.jpg','');
  return IMG_NAMES[fname] || koFallback || fname;
}

function displayName(imgPath, koFallback, imgId) {
  var name = xlate(imgPath, koFallback);
  var label = MASTERY_LABEL[imgId];
  return label ? label + ': ' + name : name;
}

var selKo = '';
var dd = document.getElementById('dd');
var csearch = document.getElementById('csearch');

function renderDD(items) {
  if (!items.length) { dd.innerHTML = '<div class="ddi" style="color:var(--muted)">No match</div>'; return; }
  dd.innerHTML = items.map(function(p){
    return '<div class="ddi" onmousedown="pick(\''+p[0].replace(/'/g,"\\'")+'\',' +
           '\''+p[1].replace(/'/g,"\\'")+'\')">' + p[0] + '<span>'+p[1]+'</span></div>';
  }).join('');
}

csearch.addEventListener('input', function(){
  var q = this.value.toLowerCase();
  var f = q ? classList.filter(function(p){ return p[0].toLowerCase().indexOf(q) !== -1; }) : classList;
  renderDD(f); dd.style.display = 'block';
});
csearch.addEventListener('focus', function(){
  var q = this.value.toLowerCase();
  var f = q ? classList.filter(function(p){ return p[0].toLowerCase().indexOf(q) !== -1; }) : classList;
  renderDD(f); dd.style.display = 'block';
});
csearch.addEventListener('blur', function(){ setTimeout(function(){ dd.style.display='none'; }, 160); });

function pick(en, ko) {
  selKo = ko;
  csearch.value = en;
  document.getElementById('sellabel').textContent = '→ ' + ko;
  dd.style.display = 'none';
}

}

// ── Render ───────────────────────────────────────────────────────────────
function render(data, label, ko) {
  var out = document.getElementById('results');
  var order = data.class_hexa || data.order || (Array.isArray(data) ? data : null);
  if (!order) {
    out.innerHTML = '<div class="panel"><div class="plabel">Raw Response</div><pre style="font-size:11px;color:var(--muted);white-space:pre-wrap;word-break:break-all">'+JSON.stringify(data,null,2)+'</pre></div>';
    return;
  }
  var icons = order.map(function(item, i) {
    var ko   = item[0]||'';
    var lvl  = item[1]!==undefined ? item[1] : '?';
    var img  = item[2]||'';
    var e    = item[3]!==undefined ? item[3] : '?';
    var f    = item[4]!==undefined ? item[4] : '?';
    var ce   = item[5]!==undefined ? item[5] : '?';
    var cf   = item[6]!==undefined ? item[6] : '?';
    var eff  = item[7]!==undefined ? item[7].toFixed(3) : '—';
    var cfd  = item[8]!==undefined ? (item[8]*100).toFixed(4) : '—';
    var imgId = parseInt((img.split('/').pop().replace('.png','').match(/_(\d+)$/) || [0,0])[1]);
    var en   = displayName(img, ko, imgId);
    var src  = img.startsWith('http') ? img : 'https://maplescouter.com'+img;
    var delay= Math.min(i*12, 900);
    var t = encodeURIComponent(
      '<div class="tn">'+en+'</div>'
      +'<div class="tr">Level up to: <b>'+lvl+'</b></div>'
      +'<div class="tr">Cost: <b>'+e+' Erda &middot; '+f+' Frags</b></div>'
      +'<div class="tr">Cumulative: <b>'+ce+' Erda &middot; '+cf+' Frags</b></div>'
      +'<div class="tr">Eff/frag: <b class="te">'+eff+'%</b></div>'
      +'<div class="tr">Total FD: <b>+'+cfd+'%</b></div>'
    );
    return '<div class="ic" style="animation:none" data-t="'+t+'">'
      +'<img src="'+src+'" alt="'+en+'" onerror="this.style.opacity=\'0.15\'">'
      +'<span class="lv">'+lvl+'</span>'
      +'</div>';
  }).join('');

  out.innerHTML = '<div class="panel">'
    +'<div class="res-head">'
    +'<span class="res-title">Level-Up Order &middot; '+label+' <span style="color:var(--muted)">'+ko+'</span></span>'
    +'<span class="res-meta">'+order.length+' steps &middot; cycle '+cycle+'</span>'
    +'</div>'
    +'<div class="grid">'+icons+'</div>'
    +'</div>';
}
